<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f0f1a"/></linearGradient>
  </defs>
  <rect width="720" height="400" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="720" height="34" fill="rgba(212,168,67,0.08)" rx="8"/>
  <rect x="0" y="26" width="720" height="8" fill="rgba(212,168,67,0.08)"/>
  <text x="360" y="22" text-anchor="middle" fill="#d4a843" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" letter-spacing="0.5">METH PRODUCTION FLOW</text>

  <!-- ===== SUPPLY CHAIN: 3 columns ===== -->
  
  <!-- COL 1: Source ingredients -->
  <rect x="30" y="50" width="200" height="175" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <rect x="30" y="50" width="200" height="24" rx="8" fill="rgba(212,168,67,0.06)"/>
  <rect x="30" y="66" width="200" height="8"/>
  <text x="130" y="66" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">RAW INGREDIENTS</text>

  <!-- Ephedrine -->
  <rect x="45" y="85" width="170" height="36" rx="6" fill="rgba(212,168,67,0.06)" stroke="rgba(212,168,67,0.12)" stroke-width="0.8"/>
  <circle cx="65" cy="103" r="11" fill="rgba(212,168,67,0.1)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="65" y="106" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">E</text>
  <text x="85" y="99" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="11">Ephedrine (base)</text>
  <text x="85" y="114" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Purchase / farm</text>

  <!-- Phenylethylamine -->
  <rect x="45" y="128" width="170" height="36" rx="6" fill="rgba(212,168,67,0.06)" stroke="rgba(212,168,67,0.12)" stroke-width="0.8"/>
  <circle cx="65" cy="146" r="11" fill="rgba(212,168,67,0.1)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="65" y="149" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">P</text>
  <text x="85" y="142" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="11">Phenylethylamine</text>
  <text x="85" y="157" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Alternative base</text>

  <!-- Chemicals -->
  <rect x="45" y="171" width="170" height="36" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
  <circle cx="65" cy="189" r="11" fill="rgba(255,255,255,0.05)"/>
  <text x="65" y="192" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif" font-size="11">C</text>
  <text x="85" y="185" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" font-size="11">Chemicals (lab)</text>
  <text x="85" y="200" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Acids / solvents</text>

  <!-- ARROW 1 -->
  <text x="248" y="145" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="15">--></text>
  <text x="248" y="160" text-anchor="middle" fill="rgba(212,168,67,0.3)" font-family="Arial,sans-serif" font-size="10">cook</text>

  <!-- COL 2: Cooking process -->
  <rect x="260" y="50" width="200" height="175" rx="8" fill="rgba(212,168,67,0.03)" stroke="#d4a843" stroke-width="1"/>
  <rect x="260" y="50" width="200" height="24" rx="8" fill="rgba(212,168,67,0.08)"/>
  <rect x="260" y="66" width="200" height="8"/>
  <text x="360" y="66" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">CHEMISTRY PROCESS</text>

  <!-- Step 1 -->
  <rect x="275" y="82" width="170" height="26" rx="4" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <circle cx="290" cy="95" r="8" fill="rgba(212,168,67,0.15)"/>
  <text x="290" y="98" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">1</text>
  <text x="305" y="99" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Mix base + chemicals</text>

  <!-- Step 2 -->
  <rect x="275" y="114" width="170" height="26" rx="4" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <circle cx="290" cy="127" r="8" fill="rgba(212,168,67,0.15)"/>
  <text x="290" y="130" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">2</text>
  <text x="305" y="131" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Heat / cook batch</text>

  <!-- Step 3 -->
  <rect x="275" y="146" width="170" height="26" rx="4" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <circle cx="290" cy="159" r="8" fill="rgba(212,168,67,0.15)"/>
  <text x="290" y="162" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">3</text>
  <text x="305" y="163" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Add cutting agents</text>

  <!-- Step 4 -->
  <rect x="275" y="178" width="170" height="26" rx="4" fill="rgba(212,168,67,0.06)" stroke="#d4a843" stroke-width="0.8"/>
  <circle cx="290" cy="191" r="8" fill="rgba(212,168,67,0.2)"/>
  <text x="290" y="194" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">4</text>
  <text x="305" y="195" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Package &amp; Label</text>

  <!-- Result tag -->
  <text x="275" y="218" fill="rgba(212,168,67,0.2)" font-family="Arial,sans-serif" font-size="12">Purity affects sell price</text>

  <!-- ARROW 2 -->
  <text x="478" y="145" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="15">--></text>
  <text x="478" y="160" text-anchor="middle" fill="rgba(212,168,67,0.3)" font-family="Arial,sans-serif" font-size="10">sell</text>

  <!-- COL 3: Distribution -->
  <rect x="490" y="50" width="200" height="175" rx="8" fill="rgba(68,204,68,0.02)" stroke="rgba(68,204,68,0.12)" stroke-width="1"/>
  <rect x="490" y="50" width="200" height="24" rx="8" fill="rgba(68,204,68,0.05)"/>
  <rect x="490" y="66" width="200" height="8"/>
  <text x="590" y="66" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="12" font-weight="bold">SALES CHANNEL</text>

  <!-- Channel 1 -->
  <circle cx="510" cy="99" r="12" fill="rgba(68,204,68,0.1)" stroke="#44cc44" stroke-width="1"/>
  <text x="510" y="103" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="12" font-weight="bold">S</text>
  <text x="530" y="97" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Street Customers</text>
  <text x="530" y="112" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Direct sales</text>

  <!-- Channel 2 -->
  <circle cx="510" cy="129" r="12" fill="rgba(68,204,68,0.1)" stroke="#44cc44" stroke-width="1"/>
  <text x="510" y="133" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="12" font-weight="bold">D</text>
  <text x="530" y="127" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Distributor Desk</text>
  <text x="530" y="142" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Assign dealer</text>

  <!-- Channel 3 -->
  <circle cx="510" cy="159" r="12" fill="rgba(68,204,68,0.1)" stroke="#44cc44" stroke-width="1"/>
  <text x="510" y="163" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="12" font-weight="bold">E</text>
  <text x="530" y="157" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Export / Bulk</text>
  <text x="530" y="172" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">High volume, lower margin</text>

  <!-- ===== BOTTOM: Cutting Agents table ===== -->
  <rect x="30" y="240" width="660" height="145" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <rect x="30" y="240" width="660" height="24" rx="8" fill="rgba(212,168,67,0.05)"/>
  <rect x="30" y="256" width="660" height="8"/>
  <text x="360" y="258" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">RECOMMENDED CUTTING AGENTS</text>

  <!-- Agent 1 -->
  <rect x="45" y="272" width="155" height="50" rx="6" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <text x="122" y="290" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Caffeine</text>
  <text x="122" y="308" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="Arial,sans-serif" font-size="10">Cheapest, stable cut</text>

  <!-- Agent 2 -->
  <rect x="210" y="272" width="155" height="50" rx="6" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <text x="287" y="290" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Sugar</text>
  <text x="287" y="308" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="Arial,sans-serif" font-size="10">Easy to source</text>

  <!-- Agent 3 -->
  <rect x="375" y="272" width="155" height="50" rx="6" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <text x="452" y="290" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Flour</text>
  <text x="452" y="308" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="Arial,sans-serif" font-size="10">Bulk, low suspicion</text>

  <!-- Agent 4 -->
  <rect x="540" y="272" width="135" height="50" rx="6" fill="rgba(212,168,67,0.04)" stroke="rgba(212,168,67,0.08)" stroke-width="0.5"/>
  <text x="607" y="290" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Baking Soda</text>
  <text x="607" y="308" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="Arial,sans-serif" font-size="10">Good for white powder</text>

  <!-- Note -->
  <text x="45" y="340" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="10">Tip: 3:1 cut ratio = 75% purity is optimal for price vs volume. More cut = lower sell price.</text>
  <text x="45" y="355" fill="rgba(255,255,255,0.15)" font-family="Arial,sans-serif" font-size="12">Source: DrugDealerSim.com Wiki Datamine v2 (73 substances: 10 drugs, 25 cuts, 20 raw, 18 intermediates)</text>
</svg>
