<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Wooden/table background -->
  <rect width="60" height="60" rx="4" fill="#5c3a1e"/>
  <rect x="0" y="0" width="60" height="60" rx="4" fill="url(#wood)" opacity="0.5"/>
  <defs>
    <pattern id="wood" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q30 8 60 12 M0 25 Q30 22 60 28 M0 40 Q30 38 60 42 M0 50 Q30 48 60 52" stroke="#6b4423" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
    <radialGradient id="pile" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Shadow under powder -->
  <ellipse cx="30" cy="36" rx="16" ry="5" fill="rgba(0,0,0,0.25)"/>
  <!-- Main powder pile - irregular crystalline shape -->
  <path d="M16 35 Q18 22 22 18 Q24 15 28 14 Q30 13 33 14 Q36 15 38 18 Q42 22 44 35 Z" 
        fill="url(#pile)" filter="url(#shadow)"/>
  <!-- Crystalline facets/highlights -->
  <path d="M22 20 Q26 17 30 18 L30 28 Q26 26 22 28 Z" fill="rgba(255,255,255,0.4)"/>
  <path d="M32 19 Q36 20 38 25 L32 28 Z" fill="rgba(255,255,255,0.2)"/>
  <path d="M28 16 L30 15 L30 25 L28 26 Z" fill="rgba(255,255,255,0.5)"/>
  <!-- Small powder grains -->
  <circle cx="18" cy="30" r="1.5" fill="#e8e8e8" opacity="0.7"/>
  <circle cx="42" cy="32" r="1" fill="#f0f0f0" opacity="0.6"/>
  <circle cx="35" cy="36" r="1.5" fill="#e0e0e0" opacity="0.5"/>
  <circle cx="25" cy="35" r="1" fill="#e8e8e8" opacity="0.6"/>
</svg>
