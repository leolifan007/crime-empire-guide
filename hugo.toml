baseURL = 'http://localhost:1313/'
theme = 'guide-theme'
title = 'Crime Empire Guide'
publishDir = 'docs'
enableRobotsTXT = true
buildFuture = true
buildDrafts = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
    [markup.goldmark.extensions]
      typographer = false
      linkify = false
      footnote = false
      table = true
      strikethrough = false
      taskList = false
      definitionList = false

[params]
  description = 'Crime Empire Guide: The ultimate database of criminal empire games — guides, strategies, recipes, and tips for Schedule I and more.'
  keywords = 'crime empire, schedule 1, schedule i, game guide, drug empire, criminal simulator'

