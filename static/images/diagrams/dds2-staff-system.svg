<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a843"/>
    </marker>
  </defs>
  <rect width="720" height="360" fill="#1a1a2e" rx="8"/>
  <text x="360" y="22" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Staff System: Hire -> Assign -> Automate</text>

  <!-- Hire row -->
  <text x="40" y="48" fill="#d4a843" font-family="Arial, sans-serif" font-size="11" font-weight="bold">HIRE</text>

  <rect x="40" y="55" width="140" height="40" rx="4" fill="#16213e" stroke="#44cc88" stroke-width="1.5"/>
  <text x="110" y="80" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Notice Boards</text>

  <rect x="190" y="55" width="140" height="40" rx="4" fill="#16213e" stroke="#cccc44" stroke-width="1.5"/>
  <text x="260" y="72" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Influencer</text>
  <text x="260" y="88" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Missions</text>

  <rect x="340" y="55" width="140" height="40" rx="4" fill="#16213e" stroke="#cc6644" stroke-width="1.5"/>
  <text x="410" y="80" text-anchor="middle" fill="#cc6644" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Story Quests</text>

  <rect x="490" y="55" width="190" height="40" rx="4" fill="#16213e" stroke="#6644cc" stroke-width="1.5"/>
  <text x="585" y="80" text-anchor="middle" fill="#6644cc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Territory Expansion</text>

  <!-- Arrow down to Roles -->
  <line x1="360" y1="105" x2="360" y2="125" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Roles row -->
  <text x="40" y="138" fill="#d4a843" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ROLES</text>

  <rect x="40" y="145" width="145" height="65" rx="5" fill="#1a2e1a" stroke="#44cc88" stroke-width="2"/>
  <text x="112" y="163" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="12" font-weight="bold">DEALER</text>
  <text x="112" y="180" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Handles customer orders</text>
  <text x="112" y="195" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Needs: Distributor Desk</text>

  <rect x="198" y="145" width="145" height="65" rx="5" fill="#2e2e1a" stroke="#cccc44" stroke-width="2"/>
  <text x="270" y="163" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="12" font-weight="bold">COOK</text>
  <text x="270" y="180" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Auto-batch processing</text>
  <text x="270" y="195" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Needs: Lab Upgrade</text>

  <rect x="356" y="145" width="145" height="65" rx="5" fill="#1a1a3d" stroke="#4466cc" stroke-width="2"/>
  <text x="428" y="163" text-anchor="middle" fill="#4466cc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">GUARD</text>
  <text x="428" y="180" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Reduces raid risk</text>
  <text x="428" y="195" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Needs: Guard Station</text>

  <rect x="514" y="145" width="165" height="65" rx="5" fill="#2e1a2e" stroke="#cc44cc" stroke-width="2"/>
  <text x="596" y="163" text-anchor="middle" fill="#cc44cc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">DISTRIBUTOR</text>
  <text x="596" y="180" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Inter-hideout logistics</text>
  <text x="596" y="195" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Needs: 2+ hideouts</text>

  <!-- Arrow down to Priority -->
  <line x1="360" y1="218" x2="360" y2="238" stroke="#d4a843" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Priority row -->
  <text x="40" y="252" fill="#d4a843" font-family="Arial, sans-serif" font-size="11" font-weight="bold">BUY ORDER (by net worth)</text>

  <rect x="40" y="260" width="130" height="40" rx="20" fill="#1a3d1a" stroke="#44cc88" stroke-width="1.5"/>
  <text x="105" y="285" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">1st: Dealer ($5k)</text>
  <line x1="175" y1="280" x2="195" y2="280" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="260" width="130" height="40" rx="20" fill="#2e2e1a" stroke="#cccc44" stroke-width="1.5"/>
  <text x="265" y="285" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="10" font-weight="bold">2nd: Cook ($15k)</text>
  <line x1="335" y1="280" x2="355" y2="280" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="360" y="260" width="130" height="40" rx="20" fill="#1a1a3d" stroke="#4466cc" stroke-width="1.5"/>
  <text x="425" y="285" text-anchor="middle" fill="#4466cc" font-family="Arial, sans-serif" font-size="10" font-weight="bold">3rd: Guard ($50k)</text>
  <line x1="495" y1="280" x2="515" y2="280" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="260" width="155" height="40" rx="20" fill="#2e1a2e" stroke="#cc44cc" stroke-width="1.5"/>
  <text x="597" y="285" text-anchor="middle" fill="#cc44cc" font-family="Arial, sans-serif" font-size="10" font-weight="bold">4th: Distributor ($100k)</text>

  <!-- Income bar -->
  <rect x="40" y="315" width="640" height="30" rx="4" fill="#16213e" stroke="#555555" stroke-width="1"/>
  <text x="360" y="334" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="9">Dealer: +$300-700/day | +Cook: +$500-1K/day | Full staff: $1.5-3.5K/day net profit</text>
</svg>
