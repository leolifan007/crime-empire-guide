<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <rect width="720" height="400" fill="#1a1a2e" rx="8"/>
  
  <text x="360" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">DDS2 Early Game Progression</text>
  
  <!-- Phase 1 -->
  <rect x="30" y="50" width="200" height="75" rx="6" fill="#16213e" stroke="#d4a843" stroke-width="2"/>
  <text x="130" y="72" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Phase 1: Street Deals</text>
  <text x="130" y="88" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Meet Shady client</text>
  <text x="130" y="102" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Complete delivery jobs</text>
  <text x="130" y="116" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Goal: $0 -> $2,000</text>

  <!-- Arrow 1 -->
  <text x="250" y="90" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="16">-&gt;</text>

  <!-- Phase 2 -->
  <rect x="270" y="50" width="200" height="75" rx="6" fill="#16213e" stroke="#d4a843" stroke-width="2"/>
  <text x="370" y="72" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Phase 2: First Lab</text>
  <text x="370" y="88" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Find recipe card</text>
  <text x="370" y="102" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Buy basic lab kit</text>
  <text x="370" y="116" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Goal: $2,000 -> $5,000</text>

  <!-- Arrow 2 -->
  <text x="490" y="90" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="16">-&gt;</text>

  <!-- Phase 3 -->
  <rect x="510" y="50" width="180" height="75" rx="6" fill="#16213e" stroke="#d4a843" stroke-width="2"/>
  <text x="600" y="72" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Phase 3: Expand</text>
  <text x="600" y="88" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Buy 2nd hideout</text>
  <text x="600" y="102" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Hire first employee</text>
  <text x="600" y="116" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Goal: $5,000+</text>

  <!-- Warning box -->
  <rect x="100" y="150" width="520" height="40" rx="4" fill="#3d1f1f" stroke="#cc4444" stroke-width="1"/>
  <text x="360" y="168" text-anchor="middle" fill="#ff6666" font-family="Arial, sans-serif" font-size="11" font-weight="bold">WARNING: Do not attempt heists or high-value jobs without at least 2 hideouts</text>
  <text x="360" y="182" text-anchor="middle" fill="#ff8888" font-family="Arial, sans-serif" font-size="10">One raid with single hideout = 80% asset loss (DDS2 hideout raid mechanics)</text>

  <!-- Heat System -->
  <rect x="30" y="210" width="320" height="150" rx="6" fill="#16213e" stroke="#d4a843" stroke-width="1"/>
  <text x="190" y="232" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Police Heat Levels (DDS2 Wanted System)</text>
  
  <rect x="45" y="245" width="90" height="35" rx="3" fill="#1a3d1a"/>
  <text x="90" y="258" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">None</text>
  <text x="90" y="272" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="9">No risk</text>
  
  <rect x="145" y="245" width="90" height="35" rx="3" fill="#3d3d1a"/>
  <text x="190" y="258" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Person of Interest</text>
  <text x="190" y="272" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="9">Active patrols</text>

  <rect x="245" y="245" width="90" height="35" rx="3" fill="#3d1a1a"/>
  <text x="290" y="258" text-anchor="middle" fill="#cc4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Wanted</text>
  <text x="290" y="272" text-anchor="middle" fill="#cc4444" font-family="Arial, sans-serif" font-size="9">Pursuit + helicopter</text>

  <text x="190" y="302" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Hideout raid risk is affected by wanted level</text>
  <text x="190" y="316" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">and hideout visibility (DDS2 Fandom Wiki)</text>
  <text x="190" y="340" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Tip: Use parkour to break line of sight</text>
  <text x="190" y="354" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Vault fences, wall-run, climb roofs</text>

  <!-- Co-op Info -->
  <rect x="370" y="210" width="320" height="150" rx="6" fill="#16213e" stroke="#d4a843" stroke-width="1"/>
  <text x="530" y="232" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">DDS2 Game Features (Steam Page)</text>
  
  <text x="390" y="255" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- World 6x larger than DDS1</text>
  <text x="390" y="270" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- 39 Steam Achievements</text>
  <text x="390" y="285" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- 3-person co-op mode</text>
  <text x="390" y="300" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- Dual currency system (Local + USD)</text>
  <text x="390" y="315" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- Parkour movement system</text>
  <text x="390" y="330" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- Hire employees with gang ranks</text>
  <text x="390" y="345" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">- Customize hideouts and labs</text>
</svg>
