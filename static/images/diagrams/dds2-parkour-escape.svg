<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" width="720" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f0f1a"/></linearGradient>
  </defs>
  <rect width="720" height="350" fill="url(#bg)" rx="8"/>
  
  <rect x="0" y="0" width="720" height="34" fill="rgba(212,168,67,0.08)" rx="8"/>
  <rect x="0" y="26" width="720" height="8" fill="rgba(212,168,67,0.08)"/>
  <text x="360" y="22" text-anchor="middle" fill="#d4a843" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="0.5">PARKOUR ESCAPE FLOW CHART</text>

  <!-- ===== FLOW: Enemy -> Detection -> Choice -> Outcome ===== -->
  
  <!-- Trigger: Enemy Spotted -->
  <rect x="280" y="50" width="160" height="34" rx="17" fill="rgba(204,68,68,0.12)" stroke="#cc4444" stroke-width="1.5"/>
  <text x="360" y="72" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="11" font-weight="bold">ENEMY / POLICE SPOTTED</text>
  
  <line x1="360" y1="84" x2="360" y2="104" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="98" fill="rgba(204,68,68,0.3)" font-family="Arial,sans-serif" font-size="8">detection</text>

  <!-- Detection Alert -->
  <rect x="290" y="104" width="140" height="24" rx="12" fill="rgba(204,68,68,0.06)" stroke="rgba(204,68,68,0.15)" stroke-width="0.5"/>
  <text x="360" y="120" text-anchor="middle" fill="rgba(204,68,68,0.6)" font-family="Arial,sans-serif" font-size="9">WANTED LEVEL INCREASES</text>

  <!-- Split: Fight or Parkour -->
  <line x1="360" y1="128" x2="360" y2="148" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  
  <!-- Y bracket -->
  <line x1="200" y1="148" x2="520" y2="148" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <line x1="200" y1="148" x2="200" y2="155" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <line x1="520" y1="148" x2="520" y2="155" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  
  <text x="360" y="145" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="8">two paths</text>

  <!-- LEFT: Fight -->
  <rect x="50" y="158" width="260" height="165" rx="8" fill="rgba(204,68,68,0.02)" stroke="rgba(204,68,68,0.15)" stroke-width="1"/>
  
  <rect x="50" y="158" width="260" height="26" rx="8" fill="rgba(204,68,68,0.05)"/>
  <rect x="50" y="176" width="260" height="8"/>
  <text x="180" y="176" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="10" font-weight="bold">COMBAT PATH</text>
  
  <!-- Fight icons -->
  <circle cx="80" cy="204" r="10" fill="rgba(204,68,68,0.15)"/>
  <text x="80" y="207" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">X</text>
  <text x="98" y="208" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Engage - call backup</text>

  <circle cx="80" cy="226" r="10" fill="rgba(204,68,68,0.15)"/>
  <text x="80" y="229" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">X</text>
  <text x="98" y="230" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Shoot or melee</text>

  <circle cx="80" cy="248" r="10" fill="rgba(204,68,68,0.15)"/>
  <text x="80" y="251" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">X</text>
  <text x="98" y="252" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Risk health + wanted spike</text>

  <!-- Outcome -->
  <rect x="80" y="270" width="200" height="40" rx="6" fill="rgba(204,68,68,0.08)" stroke="rgba(204,68,68,0.2)" stroke-width="0.8"/>
  <text x="180" y="286" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">HIGH RISK</text>
  <text x="180" y="301" text-anchor="middle" fill="rgba(204,68,68,0.5)" font-family="Arial,sans-serif" font-size="8">Death / Asset seizure / Raid</text>

  <!-- RIGHT: Parkour -->
  <rect x="410" y="158" width="260" height="165" rx="8" fill="rgba(68,204,68,0.02)" stroke="rgba(68,204,68,0.15)" stroke-width="1"/>
  
  <rect x="410" y="158" width="260" height="26" rx="8" fill="rgba(68,204,68,0.05)"/>
  <rect x="410" y="176" width="260" height="8"/>
  <text x="540" y="176" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="10" font-weight="bold">PARKOUR PATH</text>

  <!-- Parkour moves -->
  <circle cx="440" cy="204" r="10" fill="rgba(68,204,68,0.15)"/>
  <text x="440" y="207" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="9" font-weight="bold">V</text>
  <text x="458" y="208" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Vault fences &amp; obstacles</text>

  <circle cx="440" cy="226" r="10" fill="rgba(68,204,68,0.15)"/>
  <text x="440" y="229" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="9" font-weight="bold">W</text>
  <text x="458" y="230" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Wall-run &amp; climb ledges</text>

  <circle cx="440" cy="248" r="10" fill="rgba(68,204,68,0.15)"/>
  <text x="440" y="251" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="9" font-weight="bold">R</text>
  <text x="458" y="252" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="9">Rooftop shortcuts</text>

  <!-- Outcome -->
  <rect x="440" y="270" width="200" height="40" rx="6" fill="rgba(68,204,68,0.08)" stroke="rgba(68,204,68,0.2)" stroke-width="0.8"/>
  <text x="540" y="286" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="9" font-weight="bold">SAFE ESCAPE</text>
  <text x="540" y="301" text-anchor="middle" fill="rgba(68,204,68,0.5)" font-family="Arial,sans-serif" font-size="8">Breaks LOS / Wanted resets</text>

  <!-- ===== BOTTOM TIPS BAR ===== -->
  <rect x="50" y="330" width="620" height="16" rx="3" fill="rgba(212,168,67,0.04)"/>
  <text x="360" y="342" text-anchor="middle" fill="rgba(212,168,67,0.5)" font-family="Arial,sans-serif" font-size="8">Climbable: fences, dumpsters, containers, ledges. Parkour = instant LOS break.</text>
</svg>
