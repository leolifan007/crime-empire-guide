<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" width="720" height="350">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44cc88"/>
    </marker>
  </defs>
  <rect width="720" height="350" fill="#1a1a2e" rx="8"/>
  <text x="360" y="22" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Parkour Escape Flow</text>

  <!-- Police spotted -->
  <rect x="40" y="40" width="130" height="50" rx="25" fill="#3d1a1a" stroke="#cc4444" stroke-width="2"/>
  <text x="105" y="70" text-anchor="middle" fill="#ff6666" font-family="Arial, sans-serif" font-size="11" font-weight="bold">POLICE SPOT</text>
  <line x1="170" y1="65" x2="195" y2="65" stroke="#44cc88" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Sprint to obstacle -->
  <rect x="200" y="40" width="130" height="50" rx="25" fill="#2e2e1a" stroke="#cccc44" stroke-width="2"/>
  <text x="255" y="58" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SPRINT TO</text>
  <text x="255" y="75" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="10" font-weight="bold">OBSTACLE</text>
  <line x1="330" y1="65" x2="355" y2="65" stroke="#44cc88" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vault -->
  <rect x="360" y="40" width="130" height="50" rx="25" fill="#1a2e1a" stroke="#44cc88" stroke-width="2"/>
  <text x="425" y="58" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">VAULT /</text>
  <text x="425" y="75" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">WALL RUN</text>
  <line x1="490" y1="65" x2="515" y2="65" stroke="#44cc88" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Climb -->
  <rect x="520" y="40" width="160" height="50" rx="25" fill="#1a2e1a" stroke="#44cc88" stroke-width="2"/>
  <text x="600" y="58" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">CLIMB TO</text>
  <text x="600" y="75" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ROOFTOP</text>

  <!-- Parkour actions reference -->
  <text x="360" y="115" text-anchor="middle" fill="#d4a843" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Actions Reference</text>

  <!-- Vault icon box -->
  <rect x="40" y="125" width="145" height="80" rx="5" fill="#1a2e1a" stroke="#44cc88" stroke-width="1.5"/>
  <rect x="55" y="135" width="30" height="25" rx="3" fill="#44cc88" opacity="0.3"/>
  <line x1="55" y1="160" x2="85" y2="160" stroke="#44cc88" stroke-width="2"/>
  <text x="110" y="148" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">VAULT</text>
  <text x="110" y="165" fill="#888888" font-family="Arial, sans-serif" font-size="9">Over low fences</text>
  <text x="110" y="180" fill="#888888" font-family="Arial, sans-serif" font-size="9">and barriers</text>

  <!-- Wall run icon box -->
  <rect x="200" y="125" width="145" height="80" rx="5" fill="#1a2e1a" stroke="#44cc88" stroke-width="1.5"/>
  <line x1="215" y1="155" x2="260" y2="135" stroke="#44cc88" stroke-width="2"/>
  <line x1="260" y1="135" x2="260" y2="170" stroke="#44cc88" stroke-width="2"/>
  <text x="275" y="148" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">WALL RUN</text>
  <text x="275" y="165" fill="#888888" font-family="Arial, sans-serif" font-size="9">Along narrow</text>
  <text x="275" y="180" fill="#888888" font-family="Arial, sans-serif" font-size="9">alleys and walls</text>

  <!-- Climb icon box -->
  <rect x="360" y="125" width="145" height="80" rx="5" fill="#1a2e1a" stroke="#44cc88" stroke-width="1.5"/>
  <line x1="400" y1="195" x2="400" y2="145" stroke="#44cc88" stroke-width="2"/>
  <line x1="380" y1="165" x2="400" y2="145" stroke="#44cc88" stroke-width="2"/>
  <line x1="400" y1="145" x2="420" y2="165" stroke="#44cc88" stroke-width="2"/>
  <text x="435" y="148" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">CLIMB</text>
  <text x="435" y="165" fill="#888888" font-family="Arial, sans-serif" font-size="9">Roofs and</text>
  <text x="435" y="180" fill="#888888" font-family="Arial, sans-serif" font-size="9">vertical ledges</text>

  <!-- Sprint+Crouch icon box -->
  <rect x="520" y="125" width="160" height="80" rx="5" fill="#2e2e1a" stroke="#cccc44" stroke-width="1.5"/>
  <line x1="550" y1="155" x2="550" y2="175" stroke="#cccc44" stroke-width="2"/>
  <circle cx="550" cy="145" r="8" fill="none" stroke="#cccc44" stroke-width="1.5"/>
  <text x="580" y="148" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">SPRINT + CROUCH</text>
  <text x="580" y="165" fill="#888888" font-family="Arial, sans-serif" font-size="9">Move between covers</text>
  <text x="580" y="180" fill="#888888" font-family="Arial, sans-serif" font-size="9">Hide to reduce heat</text>

  <!-- Why parkour wins -->
  <text x="40" y="230" fill="#d4a843" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Fight vs. Parkour</text>
  
  <rect x="40" y="240" width="200" height="55" rx="5" fill="#3d1a1a" stroke="#cc4444" stroke-width="1.5"/>
  <text x="140" y="258" text-anchor="middle" fill="#ff6666" font-family="Arial, sans-serif" font-size="11" font-weight="bold">FIGHTING</text>
  <text x="140" y="274" text-anchor="middle" fill="#cc8888" font-family="Arial, sans-serif" font-size="9">Heat increases  wanted level</text>
  <text x="140" y="288" text-anchor="middle" fill="#cc8888" font-family="Arial, sans-serif" font-size="9">Uses ammo and health</text>

  <text x="260" y="268" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="16" font-weight="bold">VS</text>

  <rect x="310" y="240" width="200" height="55" rx="5" fill="#1a2e1a" stroke="#44cc88" stroke-width="1.5"/>
  <text x="410" y="258" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="11" font-weight="bold">PARKOUR ESCAPE</text>
  <text x="410" y="274" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="9">10-20 seconds to safety</text>
  <text x="410" y="288" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="9">No heat increase, free</text>

  <!-- Zone difficulties -->
  <text x="40" y="320" fill="#d4a843" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Zone Difficulty:</text>
  <rect x="180" y="310" width="70" height="20" rx="3" fill="#1a3d1a"/><text x="215" y="324" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10">Rural: Easy</text>
  <rect x="260" y="310" width="90" height="20" rx="3" fill="#1a3d1a"/><text x="305" y="324" text-anchor="middle" fill="#44cc88" font-family="Arial, sans-serif" font-size="10">Industrial: Easy</text>
  <rect x="360" y="310" width="90" height="20" rx="3" fill="#2e2e1a"/><text x="405" y="324" text-anchor="middle" fill="#cccc44" font-family="Arial, sans-serif" font-size="10">Urban: Medium</text>
  <rect x="460" y="310" width="90" height="20" rx="3" fill="#3d1a1a"/><text x="505" y="324" text-anchor="middle" fill="#cc6644" font-family="Arial, sans-serif" font-size="10">Coastal: Hard</text>
</svg>
