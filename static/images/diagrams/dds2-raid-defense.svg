<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f0f1a"/></linearGradient>
  </defs>
  <rect width="720" height="380" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="720" height="34" fill="rgba(212,168,67,0.08)" rx="8"/>
  <rect x="0" y="26" width="720" height="8" fill="rgba(212,168,67,0.08)"/>
  <text x="360" y="22" text-anchor="middle" fill="#d4a843" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" letter-spacing="0.5">HIDEOUT RAID DEFENSE SYSTEM</text>

  <!-- ===== TOP ROW: 3 factors ===== -->
  
  <!-- Factor 1: Visibility -->
  <rect x="30" y="50" width="200" height="90" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.12)" stroke-width="1"/>
  <rect x="30" y="50" width="200" height="24" rx="8" fill="rgba(212,168,67,0.06)"/>
  <rect x="30" y="66" width="200" height="8"/>
  <text x="130" y="66" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">HIDEOUT VISIBILITY</text>
  
  <rect x="45" y="82" width="170" height="20" rx="4" fill="rgba(68,204,68,0.1)" stroke="rgba(68,204,68,0.15)" stroke-width="0.5"/>
  <text x="130" y="96" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="10">Low: Basement / Alley</text>
  
  <rect x="45" y="106" width="170" height="20" rx="4" fill="rgba(204,136,68,0.1)" stroke="rgba(204,136,68,0.15)" stroke-width="0.5"/>
  <text x="130" y="120" text-anchor="middle" fill="#cc8844" font-family="Arial,sans-serif" font-size="10">Medium: Industrial</text>

  <rect x="45" y="130" width="170" height="6" rx="3" fill="rgba(212,168,67,0.08)"/>
  <rect x="45" y="130" width="85" height="6" rx="3" fill="#d4a843"/>

  <!-- Factor 2: Heat -->
  <rect x="260" y="50" width="200" height="90" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.12)" stroke-width="1"/>
  <rect x="260" y="50" width="200" height="24" rx="8" fill="rgba(212,168,67,0.06)"/>
  <rect x="260" y="66" width="200" height="8"/>
  <text x="360" y="66" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">WANTED LEVEL</text>

  <rect x="275" y="82" width="50" height="20" rx="4" fill="rgba(68,204,68,0.12)"/>
  <text x="300" y="96" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="10">None</text>
  
  <rect x="330" y="82" width="50" height="20" rx="4" fill="rgba(212,168,67,0.12)"/>
  <text x="355" y="96" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="10">Interest</text>
  
  <rect x="385" y="82" width="60" height="20" rx="4" fill="rgba(204,68,68,0.12)"/>
  <text x="415" y="96" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="10">Wanted</text>

  <rect x="275" y="110" width="170" height="6" rx="3" fill="rgba(204,68,68,0.08)"/>
  <rect x="275" y="110" width="120" height="6" rx="3" fill="#d4a843"/>
  <text x="360" y="130" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="10">Activities increase heat bar</text>

  <!-- Factor 3: Security -->
  <rect x="490" y="50" width="200" height="90" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.12)" stroke-width="1"/>
  <rect x="490" y="50" width="200" height="24" rx="8" fill="rgba(212,168,67,0.06)"/>
  <rect x="490" y="66" width="200" height="8"/>
  <text x="590" y="66" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">SECURITY UPGRADES</text>

  <circle cx="510" cy="95" r="10" fill="rgba(212,168,67,0.1)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="510" y="98" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">A</text>
  <text x="525" y="93" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Alarms</text>

  <circle cx="610" cy="95" r="10" fill="rgba(212,168,67,0.1)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="610" y="98" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">L</text>
  <text x="625" y="93" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Locks</text>

  <circle cx="560" cy="120" r="10" fill="rgba(212,168,67,0.1)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="560" y="123" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="11" font-weight="bold">C</text>
  <text x="575" y="118" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" font-size="11">Cameras</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="30" y1="155" x2="690" y2="155" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <text x="360" y="168" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="11">RAID EVENT -- DISASTER RECOVERY</text>

  <!-- ===== MIDDLE: Raid Event Flow ===== -->
  <rect x="260" y="178" width="200" height="30" rx="15" fill="rgba(204,68,68,0.08)" stroke="#cc4444" stroke-width="1.2"/>
  <text x="360" y="198" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="12" font-weight="bold">RAID TRIGGERED</text>

  <!-- Loss breakdown -->
  <rect x="30" y="222" width="200" height="115" rx="8" fill="rgba(204,68,68,0.02)" stroke="rgba(204,68,68,0.1)" stroke-width="1"/>
  <rect x="30" y="222" width="200" height="22" rx="8" fill="rgba(204,68,68,0.04)"/>
  <rect x="30" y="236" width="200" height="8"/>
  <text x="130" y="238" text-anchor="middle" fill="#cc4444" font-family="Arial,sans-serif" font-size="12" font-weight="bold">ASSET LOSS</text>

  <!-- Loss bars -->
  <text x="45" y="260" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Cash</text>
  <rect x="100" y="252" width="115" height="6" rx="3" fill="rgba(204,68,68,0.08)"/>
  <rect x="100" y="252" width="80" height="6" rx="3" fill="#cc4444"/>

  <text x="45" y="278" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Product</text>
  <rect x="100" y="270" width="115" height="6" rx="3" fill="rgba(204,68,68,0.08)"/>
  <rect x="100" y="270" width="92" height="6" rx="3" fill="#cc4444"/>

  <text x="45" y="296" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Equipment</text>
  <rect x="100" y="288" width="115" height="6" rx="3" fill="rgba(204,68,68,0.08)"/>
  <rect x="100" y="288" width="60" height="6" rx="3" fill="#cc4444"/>

  <text x="130" y="320" text-anchor="middle" fill="rgba(204,68,68,0.5)" font-family="Arial,sans-serif" font-size="11" font-weight="bold">~60-80% loss single hideout</text>

  <!-- Arrow -->
  <text x="250" y="285" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12">--></text>

  <!-- Prevention -->
  <rect x="270" y="222" width="200" height="115" rx="8" fill="rgba(68,204,68,0.02)" stroke="rgba(68,204,68,0.1)" stroke-width="1"/>
  <rect x="270" y="222" width="200" height="22" rx="8" fill="rgba(68,204,68,0.04)"/>
  <rect x="270" y="236" width="200" height="8"/>
  <text x="370" y="238" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="12" font-weight="bold">PREVENTION</text>

  <text x="285" y="258" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Split goods across hideouts</text>
  <text x="285" y="276" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Keep wanted level low</text>
  <text x="285" y="294" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Install security upgrades</text>
  <text x="285" y="312" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Establish backup hideout</text>

  <rect x="285" y="320" width="170" height="10" rx="3" fill="rgba(68,204,68,0.08)"/>
  <text x="370" y="328" text-anchor="middle" fill="#44cc44" font-family="Arial,sans-serif" font-size="10">Loss < 20% with preparation</text>

  <!-- Arrow -->
  <text x="490" y="285" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12">--></text>

  <!-- Recovery -->
  <rect x="510" y="222" width="180" height="115" rx="8" fill="rgba(212,168,67,0.02)" stroke="rgba(212,168,67,0.1)" stroke-width="1"/>
  <rect x="510" y="222" width="180" height="22" rx="8" fill="rgba(212,168,67,0.04)"/>
  <rect x="510" y="236" width="180" height="8"/>
  <text x="600" y="238" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="12" font-weight="bold">RECOVERY</text>

  <text x="525" y="260" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Rebuild at backup hideout</text>
  <text x="525" y="280" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Source new ingredients</text>
  <text x="525" y="300" fill="rgba(255,255,255,0.35)" font-family="Arial,sans-serif" font-size="10">Rehire lost employees</text>

  <rect x="525" y="315" width="150" height="15" rx="3" fill="rgba(212,168,67,0.08)"/>
  <text x="600" y="326" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="10">Backup = within 1 day</text>
</svg>
