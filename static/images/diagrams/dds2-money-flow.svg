<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44cc88"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ccaa44"/>
    </marker>
  </defs>
  <rect width="720" height="380" fill="#1a1a2e" rx="8"/>
  <text x="360" y="22" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">DDS2 Income Progression (5 Stages)</text>

  <!-- Y-axis baseline -->
  <line x1="80" y1="40" x2="80" y2="320" stroke="#444444" stroke-width="1"/>
  <text x="60" y="320" text-anchor="end" fill="#666666" font-family="Arial, sans-serif" font-size="9">$0/hr</text>
  <text x="60" y="250" text-anchor="end" fill="#666666" font-family="Arial, sans-serif" font-size="9">$1K/hr</text>
  <text x="60" y="180" text-anchor="end" fill="#666666" font-family="Arial, sans-serif" font-size="9">$2K/hr</text>
  <text x="60" y="110" text-anchor="end" fill="#666666" font-family="Arial, sans-serif" font-size="9">$3K/hr</text>
  <text x="60" y="50" text-anchor="end" fill="#666666" font-family="Arial, sans-serif" font-size="9">$4K/hr</text>

  <!-- Grid lines -->
  <line x1="80" y1="320" x2="680" y2="320" stroke="#333333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="250" x2="680" y2="250" stroke="#333333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="180" x2="680" y2="180" stroke="#333333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="110" x2="680" y2="110" stroke="#333333" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Bar 1 - Street Deals -->
  <rect x="100" y="270" width="90" height="50" rx="3" fill="#88cc88"/>
  <text x="145" y="285" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$400/hr</text>
  <text x="145" y="340" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Street</text>
  <text x="145" y="355" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Deals</text>

  <!-- Arrow -->
  <line x1="195" y1="295" x2="215" y2="250" stroke="#ccaa44" stroke-width="2" marker-end="url(#arrowY)"/>

  <!-- Bar 2 - Cooking -->
  <rect x="220" y="230" width="90" height="90" rx="3" fill="#ccaa44"/>
  <text x="265" y="265" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$600/hr</text>
  <text x="265" y="340" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Basic</text>
  <text x="265" y="355" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Cooking</text>

  <!-- Arrow -->
  <line x1="315" y1="275" x2="335" y2="200" stroke="#ccaa44" stroke-width="2" marker-end="url(#arrowY)"/>

  <!-- Bar 3 - Territory -->
  <rect x="340" y="180" width="90" height="140" rx="3" fill="#cc6644"/>
  <text x="385" y="235" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$1,200/hr</text>
  <text x="385" y="340" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Territory</text>
  <text x="385" y="355" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Expansion</text>

  <!-- Arrow -->
  <line x1="435" y1="250" x2="455" y2="160" stroke="#66aacc" stroke-width="2" marker-end="url(#arrowY)"/>

  <!-- Bar 4 - Staff+Labs -->
  <rect x="460" y="110" width="90" height="210" rx="3" fill="#66aacc"/>
  <text x="505" y="200" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$2,000+/hr</text>
  <text x="505" y="340" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Staff +</text>
  <text x="505" y="355" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Labs</text>

  <!-- Arrow -->
  <line x1="555" y1="215" x2="575" y2="100" stroke="#cc66cc" stroke-width="2" marker-end="url(#arrowY)"/>

  <!-- Bar 5 - Co-op -->
  <rect x="580" y="50" width="80" height="270" rx="3" fill="#cc66cc"/>
  <text x="620" y="175" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">$3,000+/hr</text>
  <text x="620" y="340" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">Co-op</text>
  <text x="620" y="355" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">(3 players)</text>

  <!-- Note -->
  <text x="360" y="375" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9">Source: Steam Community guides + Reddit player reports | Police hours give +25% bonus during peak</text>
</svg>
