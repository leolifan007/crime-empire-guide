  <rect x="495" y="230" width="42" height="42" rx="4" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.15)" stroke-width="0.5"/>
  <text x="516" y="250" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="9" font-weight="bold">P</text>
  <text x="516" y="262" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif" font-size="6">Poppy</text>
  
  <text x="547" y="253" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="12">-></text>
  
  <rect x="559" y="230" width="42" height="42" rx="4" fill="rgba(212,168,67,0.12)" stroke="#d4a843" stroke-width="0.8"/>
  <text x="580" y="250" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="9" font-weight="bold">O</text>
  <text x="580" y="262" text-anchor="middle" fill="#d4a843" font-family="Arial,sans-serif" font-size="6">Opium</text>
  
  <text x="611" y="253" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="12">+</text>

  <rect x="623" y="230" width="42" height="42" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
