<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <rect width="720" height="280" fill="#1a1a2e" rx="8"/>
  <text x="360" y="25" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">DDS2 Income Progression</text>
  
  <!-- Bars -->
  <rect x="60" y="60" width="100" height="120" rx="4" fill="#88cc88" opacity="0.8"/>
  <text x="110" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Street Deals</text>
  <text x="110" y="52" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$400/hr</text>
  
  <rect x="200" y="40" width="100" height="140" rx="4" fill="#ccaa44" opacity="0.8"/>
  <text x="250" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Basic Cooking</text>
  <text x="250" y="32" text-anchor="middle" fill="#ccaa44" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$600/hr</text>
  
  <rect x="340" y="20" width="100" height="160" rx="4" fill="#cc6644" opacity="0.8"/>
  <text x="390" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Territory</text>
  <text x="390" y="12" text-anchor="middle" fill="#cc6644" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$1,200/hr</text>

  <rect x="480" y="50" width="100" height="130" rx="4" fill="#66aacc" opacity="0.8"/>
  <text x="530" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Staff + Labs</text>
  <text x="530" y="42" text-anchor="middle" fill="#66aacc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$2,000+/hr</text>

  <rect x="620" y="10" width="80" height="170" rx="4" fill="#cc66cc" opacity="0.8"/>
  <text x="660" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Co-op</text>
  <text x="660" y="2" text-anchor="middle" fill="#cc66cc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">$3,000+/hr</text>

  <!-- Y axis label -->
  <text x="15" y="140" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="9" transform="rotate(-90,15,140)">Income per Hour (est.)</text>

  <!-- Note -->
  <text x="360" y="225" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="10">Data based on Steam community guides and Reddit player reports</text>
  <text x="360" y="240" text-anchor="middle" fill="#888888" font-family="Arial, sans-serif" font-size="10">Police hours give extra cash. Co-op triples throughput (3 players max).</text>
  <text x="360" y="260" text-anchor="middle" fill="#88cc88" font-family="Arial, sans-serif" font-size="10">Key: Split product across hideouts to protect against raids</text>
</svg>
