  <text x="360" y="22" text-anchor="middle" fill="#d4a843" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="0.5">MONEY FLOW: FROM STREET DEALS TO EMPIRE</text>

